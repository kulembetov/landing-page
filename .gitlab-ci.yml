stages:
  - validate
  - security
  - package

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

validate_app:
  stage: validate
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run format:check
    - npm run build

gitleaks_scan:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.24.2
    entrypoint: [""]
  script:
    - gitleaks detect --source . --redact --verbose --exit-code 1

semgrep_scan:
  stage: security
  image: semgrep/semgrep:1.163.0
  before_script:
    - rm -rf /src && ln -s "$CI_PROJECT_DIR" /src
  script:
    - semgrep scan --config p/ci --error --metrics=off

trivy_fs_scan:
  stage: security
  image:
    name: aquasec/trivy:0.70.0
    entrypoint: [""]
  script:
    - trivy fs --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --exit-code 1 --no-progress .
