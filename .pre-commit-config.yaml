minimum_pre_commit_version: "3.7.0"
fail_fast: true
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: prettier-check
        name: prettier (check)
        entry: npx prettier --check --ignore-unknown
        language: system
        pass_filenames: true
        stages: [pre-commit]
      - id: validate-push
        name: validate before push (format + build)
        entry: npm run validate:push
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        stages: [pre-commit, pre-push]

  - repo: https://github.com/semgrep/pre-commit
    rev: v1.163.0
    hooks:
      - id: semgrep
        stages: [pre-push]
        args:
          - --config
          - p/ci
          - --error
          - --skip-unknown-extensions

  - repo: https://github.com/mxab/pre-commit-trivy.git
    rev: v0.18.0
    hooks:
      - id: trivyfs-docker
        stages: [pre-push]
        pass_filenames: false
        args:
          - --severity
          - HIGH,CRITICAL
          - --exit-code
          - "1"
          - .
      - id: trivyconfig-docker
        stages: [pre-push]
        pass_filenames: false
        args:
          - --severity
          - HIGH,CRITICAL
          - --exit-code
          - "1"
          - .

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional"
